<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vybizo — Set New Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;min-height:100vh;background:#07000f;display:flex;align-items:center;justify-content:center;padding:30px 16px;}
    .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 15% 50%,#1a0533 0%,transparent 55%),radial-gradient(ellipse at 85% 20%,#001a3d 0%,transparent 55%),#07000f;animation:bgShift 10s ease-in-out infinite alternate;}
    @keyframes bgShift{from{filter:hue-rotate(0deg);}to{filter:hue-rotate(25deg) brightness(1.12);}}
    .floaters{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    .floater{position:absolute;border-radius:22%;opacity:.12;animation:bob ease-in-out infinite;}
    @keyframes bob{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-34px) rotate(180deg);}}
    .f1{left:4%;top:12%;width:48px;height:48px;background:#1877F2;animation-duration:7s;animation-delay:-1s;}
    .f2{left:80%;top:60%;width:36px;height:36px;background:#1877F2;animation-duration:9s;animation-delay:-4s;}
    .i1{left:26%;top:70%;width:50px;height:50px;background:linear-gradient(135deg,#833AB4,#FD1D1D,#FCAF45);animation-duration:8s;animation-delay:-3s;}
    .w1{left:90%;top:30%;width:42px;height:42px;background:#25D366;animation-duration:6s;animation-delay:-1s;}
    .card{position:relative;z-index:10;width:min(420px,100%);background:rgba(255,255,255,.06);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.13);border-radius:24px;padding:36px 36px 30px;box-shadow:0 0 80px rgba(168,85,247,.18);animation:slideUp .65s cubic-bezier(.22,1,.36,1) both;overflow:hidden;}
    @keyframes slideUp{from{opacity:0;transform:translateY(36px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}
    .vybizo-word{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;letter-spacing:6px;display:flex;justify-content:center;animation:wordGlow 3.5s ease-in-out 1.2s infinite alternate;}
    @keyframes wordGlow{from{filter:brightness(1);}to{filter:brightness(1.28) drop-shadow(0 0 16px rgba(255,110,247,.45));}}
    .vybizo-word span{opacity:0;animation:letterDrop .55s cubic-bezier(.22,1,.36,1) forwards;}
    @keyframes letterDrop{0%{opacity:0;transform:translateY(-55px) scale(1.35);}55%{opacity:1;transform:translateY(6px) scale(.96);}75%{transform:translateY(-3px);}100%{opacity:1;transform:translateY(0) scale(1);}}
    .vybizo-word span:nth-child(1){animation-delay:.08s;}.vybizo-word span:nth-child(2){animation-delay:.18s;}.vybizo-word span:nth-child(3){animation-delay:.28s;}.vybizo-word span:nth-child(4){animation-delay:.38s;}.vybizo-word span:nth-child(5){animation-delay:.48s;}.vybizo-word span:nth-child(6){animation-delay:.58s;}
    .lV{color:#ff6ef7;-webkit-text-stroke:1.5px #cc00bb;text-shadow:0 0 18px rgba(255,110,247,.95),0 3px 0 #880077;}
    .lY{color:#ffd166;-webkit-text-stroke:1.5px #dd8800;text-shadow:0 0 18px rgba(255,209,102,.95),0 3px 0 #995500;}
    .lB{color:#00ffee;-webkit-text-stroke:1.5px #009988;text-shadow:0 0 18px rgba(0,255,238,.95),0 3px 0 #006655;}
    .lI{color:#ff7eb3;-webkit-text-stroke:1.5px #ee0044;text-shadow:0 0 18px rgba(255,126,179,.95),0 3px 0 #990033;}
    .lZ{color:#aaff55;-webkit-text-stroke:1.5px #44cc00;text-shadow:0 0 18px rgba(170,255,85,.95),0 3px 0 #227700;}
    .lO{color:#55aaff;-webkit-text-stroke:1.5px #0055ee;text-shadow:0 0 18px rgba(85,170,255,.95),0 3px 0 #003399;}
    .meaning-wrap{min-height:22px;margin:8px 0 18px;text-align:center;}
    #meaning{font-size:11px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.45);border-right:2px solid #c084fc;padding-right:2px;animation:cursorBlink .75s step-end infinite;}
    @keyframes cursorBlink{0%,100%{border-color:#c084fc;}50%{border-color:transparent;}}
    .section-title{text-align:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.3);margin-bottom:20px;}
    label{display:block;font-size:11px;font-weight:500;color:rgba(255,255,255,.45);letter-spacing:.7px;text-transform:uppercase;margin-bottom:6px;}
    .field{margin-bottom:15px;}
    .input-wrap{position:relative;}
    .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.3;pointer-events:none;}
    input[type=password]{width:100%;padding:11px 14px 11px 40px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border .2s,box-shadow .2s;}
    input::placeholder{color:rgba(255,255,255,.22);}
    input:focus{border-color:rgba(192,132,252,.7);background:rgba(255,255,255,.09);box-shadow:0 0 0 3px rgba(192,132,252,.15);}
    .strength-bar{height:3px;border-radius:99px;background:rgba(255,255,255,.08);margin-top:6px;overflow:hidden;}
    .strength-fill{height:100%;width:0;border-radius:99px;transition:width .3s,background .3s;}
    .btn{position:relative;overflow:hidden;width:100%;padding:13px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#ff6ef7,#a855f7,#007aff);background-size:200% 200%;background-position:left center;transition:background-position .4s,transform .15s,box-shadow .3s;box-shadow:0 4px 24px rgba(168,85,247,.5);}
    .btn:hover{background-position:right center;box-shadow:0 6px 32px rgba(168,85,247,.75);transform:translateY(-2px);}
    .btn:active{transform:scale(.97);}
    .flash{border-radius:10px;padding:9px 13px;font-size:13px;margin-bottom:14px;}
    .flash.error{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.3);}
    .flash.success{background:rgba(34,197,94,0.15);color:#86efac;border:1px solid rgba(34,197,94,0.3);}
    .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.3);transform:scale(0);animation:rippleAnim .55s ease-out forwards;pointer-events:none;}
    @keyframes rippleAnim{to{transform:scale(4.5);opacity:0;}}
  </style>
</head>
<body>
<div class="bg"></div>
<div class="floaters">
  <div class="floater f1"></div><div class="floater f2"></div>
  <div class="floater i1"></div><div class="floater w1"></div>
</div>
<div class="card">
  <div style="text-align:center;margin-bottom:4px;">
    <div class="vybizo-word"><span class="lV">V</span><span class="lY">Y</span><span class="lB">B</span><span class="lI">I</span><span class="lZ">Z</span><span class="lO">O</span></div>
    <div class="meaning-wrap"><span id="meaning"></span></div>
  </div>
  <div class="section-title">— Set New Password —</div>
  
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  
  <form method="POST" action="/forgot/reset">
    <div class="field">
      <label>New Password</label>
      <div class="input-wrap">
        <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input type="password" name="password" id="pwd" placeholder="Min 6 characters" required oninput="chkStr(this.value)"/>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="sbar"></div></div>
    </div>
    <div class="field">
      <label>Confirm New Password</label>
      <div class="input-wrap">
        <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input type="password" name="confirm" placeholder="Repeat password" required/>
      </div>
    </div>
    <button type="submit" class="btn">Update Password ✓</button>
  </form>
</div>
<script>
function chkStr(v){const b=document.getElementById("sbar");const s=[v.length>=6,/[A-Z]/.test(v),/[0-9]/.test(v),/[^A-Za-z0-9]/.test(v),v.length>=10];const n=s.filter(Boolean).length;b.style.width=(n*20)+"%";if(n>0)b.style.background=["#ef4444","#f97316","#eab308","#22c55e","#10b981"][n-1];}
const phrases=["Vybe · Your Biz · Zero Limits","Where Small Business Meets Social","One Platform · Infinite Possibilities"];
const el=document.getElementById("meaning");
if(el){let pi=0,ci=0,del=false;function tick(){const p=phrases[pi];if(!del){ci++;el.textContent=p.slice(0,ci);if(ci===p.length){del=true;setTimeout(tick,2400);return;}setTimeout(tick,60);}else{ci--;el.textContent=p.slice(0,ci);if(ci===0){del=false;pi=(pi+1)%phrases.length;setTimeout(tick,500);return;}setTimeout(tick,30);}}setTimeout(tick,1100);}
document.querySelectorAll(".btn").forEach(btn=>{btn.addEventListener("click",e=>{const r=document.createElement("span");const rect=btn.getBoundingClientRect();const s=Math.max(rect.width,rect.height);r.className="ripple";r.style.cssText=`width:${s}px;height:${s}px;left:${e.clientX-rect.left-s/2}px;top:${e.clientY-rect.top-s/2}px`;btn.appendChild(r);setTimeout(()=>r.remove(),600);});});
</script>
</body>
</html>

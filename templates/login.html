<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vybizo — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;min-height:100vh;background:#07000f;display:flex;align-items:center;justify-content:center;padding:30px 16px;}

    .bg{position:fixed;inset:0;z-index:0;
        background:radial-gradient(ellipse at 15% 50%,#1a0533 0%,transparent 55%),
                   radial-gradient(ellipse at 85% 20%,#001a3d 0%,transparent 55%),
                   radial-gradient(ellipse at 55% 85%,#0d2200 0%,transparent 55%),#07000f;
        animation:bgShift 10s ease-in-out infinite alternate;}
    @keyframes bgShift{from{filter:hue-rotate(0deg);}to{filter:hue-rotate(25deg) brightness(1.12);}}

    .floaters{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    .floater{position:absolute;border-radius:22%;display:flex;align-items:center;justify-content:center;opacity:0.12;animation:bob ease-in-out infinite;}
    @keyframes bob{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-34px) rotate(180deg);}}
    .f1{left:4%;top:12%;width:48px;height:48px;background:#1877F2;animation-duration:7s;animation-delay:-1s;}
    .f2{left:80%;top:60%;width:36px;height:36px;background:#1877F2;animation-duration:9s;animation-delay:-4s;}
    .i1{left:26%;top:70%;width:52px;height:52px;background:linear-gradient(135deg,#833AB4,#FD1D1D,#FCAF45);animation-duration:8s;animation-delay:-3s;}
    .i2{left:58%;top:16%;width:40px;height:40px;background:linear-gradient(135deg,#833AB4,#FD1D1D,#FCAF45);animation-duration:10s;animation-delay:-6s;}
    .w1{left:44%;top:84%;width:46px;height:46px;background:#25D366;animation-duration:9s;animation-delay:-2s;}
    .w2{left:90%;top:30%;width:42px;height:42px;background:#25D366;animation-duration:6s;animation-delay:-1s;}

    /* ═══════════════════════════════════
       CARD — clips the logo inside it
    ═══════════════════════════════════ */
    .card{
      position:relative;z-index:10;
      width:min(420px,100%);
      background:rgba(255,255,255,0.06);
      backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
      border:1px solid rgba(255,255,255,0.13);
      border-radius:24px;
      padding:32px 32px 28px;
      box-shadow:0 0 80px rgba(168,85,247,0.18);
      overflow:hidden;                    /* ← keeps glow inside */
      animation:slideUp 0.65s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(36px) scale(0.96);}to{opacity:1;transform:translateY(0) scale(1);}}

    /* ═══════════════════════════════════
       VYBIZO LOGO — fits card at 44px
    ═══════════════════════════════════ */
    .vybizo-hero{text-align:center;padding-top:4px;margin-bottom:6px;}

    .vybizo-word{
      font-family:'Syne',sans-serif;
      font-size:44px;          /* reduced from 64px — fits 420px card */
      font-weight:800;
      letter-spacing:6px;
      line-height:1.1;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:0;
    }

    /* Letter drop animation */
    .vybizo-word span{
      display:inline-block;
      opacity:0;
      animation:letterDrop 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes letterDrop{
      0%  {opacity:0;transform:translateY(-55px) scale(1.35) rotateX(-40deg);}
      55% {opacity:1;transform:translateY(6px) scale(0.96) rotateX(4deg);}
      75% {transform:translateY(-3px) scale(1.01);}
      100%{opacity:1;transform:translateY(0) scale(1) rotateX(0);}
    }
    .vybizo-word span:nth-child(1){animation-delay:0.08s;}
    .vybizo-word span:nth-child(2){animation-delay:0.18s;}
    .vybizo-word span:nth-child(3){animation-delay:0.28s;}
    .vybizo-word span:nth-child(4){animation-delay:0.38s;}
    .vybizo-word span:nth-child(5){animation-delay:0.48s;}
    .vybizo-word span:nth-child(6){animation-delay:0.58s;}

    /* Gentle pulse after all letters land */
    .vybizo-word{animation:wordGlow 3.5s ease-in-out 1.2s infinite alternate;}
    @keyframes wordGlow{from{filter:brightness(1);}to{filter:brightness(1.28) drop-shadow(0 0 16px rgba(255,110,247,0.45));}}

    /* Per-letter colors + strokes */
    .lV{color:#ff6ef7;-webkit-text-stroke:1.5px #cc00bb;
        text-shadow:0 0 18px rgba(255,110,247,0.95),0 0 40px rgba(200,0,180,0.5),0 3px 0 #880077;}
    .lY{color:#ffd166;-webkit-text-stroke:1.5px #dd8800;
        text-shadow:0 0 18px rgba(255,209,102,0.95),0 0 40px rgba(220,136,0,0.5),0 3px 0 #995500;}
    .lB{color:#00ffee;-webkit-text-stroke:1.5px #009988;
        text-shadow:0 0 18px rgba(0,255,238,0.95),0 0 40px rgba(0,180,160,0.5),0 3px 0 #006655;}
    .lI{color:#ff7eb3;-webkit-text-stroke:1.5px #ee0044;
        text-shadow:0 0 18px rgba(255,126,179,0.95),0 0 40px rgba(238,0,68,0.5),0 3px 0 #990033;}
    .lZ{color:#aaff55;-webkit-text-stroke:1.5px #44cc00;
        text-shadow:0 0 18px rgba(170,255,85,0.95),0 0 40px rgba(68,200,0,0.5),0 3px 0 #227700;}
    .lO{color:#55aaff;-webkit-text-stroke:1.5px #0055ee;
        text-shadow:0 0 18px rgba(85,170,255,0.95),0 0 40px rgba(0,85,238,0.5),0 3px 0 #003399;}

    /* ═══════════════════════════════════
       TYPEWRITER — pure JS, no CSS width
    ═══════════════════════════════════ */
    .vybizo-meaning-wrap{
      min-height:24px;
      margin-top:10px;
      margin-bottom:20px;
      text-align:center;
    }
    #meaning{
      font-family:'DM Sans',sans-serif;
      font-size:11px;
      font-weight:600;
      letter-spacing:2.5px;
      text-transform:uppercase;
      color:rgba(255,255,255,0.45);
      /* blinking cursor via border-right — no width animation */
      border-right:2px solid #c084fc;
      padding-right:2px;
      animation:cursorBlink 0.75s step-end infinite;
    }
    @keyframes cursorBlink{0%,100%{border-color:#c084fc;}50%{border-color:transparent;}}

    /* ═══════════════════════════════════
       REST OF CARD
    ═══════════════════════════════════ */
    .sp-row{display:flex;justify-content:center;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
    .sp{display:flex;align-items:center;gap:5px;padding:4px 10px 4px 8px;border-radius:99px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:#fff;}
    .sp-fb{background:#1877F2;}.sp-ig{background:linear-gradient(135deg,#833AB4,#FD1D1D,#FCAF45);}.sp-wa{background:#25D366;}

    .section-title{text-align:center;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:20px;}

    label{display:block;font-size:11px;font-weight:500;color:rgba(255,255,255,0.45);letter-spacing:0.7px;text-transform:uppercase;margin-bottom:6px;}
    .field{margin-bottom:15px;}
    .input-wrap{position:relative;}
    .input-wrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:0.3;pointer-events:none;}
    input[type=text],input[type=password]{
      width:100%;padding:11px 14px 11px 40px;
      background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
      border-radius:12px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;
      outline:none;transition:border 0.2s,background 0.2s,box-shadow 0.2s;
    }
    input::placeholder{color:rgba(255,255,255,0.22);}
    input:focus{border-color:rgba(192,132,252,0.7);background:rgba(255,255,255,0.09);box-shadow:0 0 0 3px rgba(192,132,252,0.15);}

    .btn{
      position:relative;overflow:hidden;
      width:100%;padding:13px;
      font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
      color:#fff;border:none;border-radius:12px;cursor:pointer;
      background:linear-gradient(135deg,#ff6ef7,#a855f7,#007aff);
      background-size:200% 200%;background-position:left center;
      transition:background-position 0.4s,transform 0.15s,box-shadow 0.3s;
      box-shadow:0 4px 24px rgba(168,85,247,0.5);
    }
    .btn:hover{background-position:right center;box-shadow:0 6px 32px rgba(168,85,247,0.75);transform:translateY(-2px);}
    .btn:active{transform:scale(0.97);}
    .divider{display:flex;align-items:center;gap:10px;margin:16px 0 0;color:rgba(255,255,255,0.15);font-size:12px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08);}
    .link-row{text-align:center;margin-top:13px;font-size:13px;color:rgba(255,255,255,0.35);}
    .link-row a{color:#c084fc;text-decoration:none;font-weight:600;}
    .link-row a:hover{text-decoration:underline;}
    .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.3);transform:scale(0);animation:rippleAnim 0.55s ease-out forwards;pointer-events:none;}
    @keyframes rippleAnim{to{transform:scale(4.5);opacity:0;}}

    /* flash messages */
    .flash{border-radius:10px;padding:9px 13px;font-size:13px;margin-bottom:14px;}
    .flash.error{background:rgba(239,68,68,0.15);color:#fca5a5;border:1px solid rgba(239,68,68,0.3);}
    .flash.success{background:rgba(34,197,94,0.15);color:#86efac;border:1px solid rgba(34,197,94,0.3);}
  </style>
</head>
<body>
<div class="bg"></div>
<div class="floaters">
  <div class="floater f1"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg></div>
  <div class="floater f2"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg></div>
  <div class="floater i1"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none"/></svg></div>
  <div class="floater i2"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none"/></svg></div>
  <div class="floater w1"><svg width="23" height="23" viewBox="0 0 24 24" fill="white"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></div>
  <div class="floater w2"><svg width="21" height="21" viewBox="0 0 24 24" fill="white"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></div>
</div>

<div class="card">

  <!-- ── VYBIZO LOGO ── -->
  <div class="vybizo-hero">
    <div class="vybizo-word">
      <span class="lV">V</span>
      <span class="lY">Y</span>
      <span class="lB">B</span>
      <span class="lI">I</span>
      <span class="lZ">Z</span>
      <span class="lO">O</span>
    </div>
    <div class="vybizo-meaning-wrap">
      <span id="meaning"></span>
    </div>
  </div>

  <!-- flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <div class="sp-row">
    <div class="sp sp-fb"><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>Facebook</div>
    <div class="sp sp-ig"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none"/></svg>Instagram</div>
    <div class="sp sp-wa"><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>WhatsApp</div>
  </div>

  <div class="section-title">— Welcome Back —</div>

  <form method="POST" action="/login">
    <div class="field">
      <label>Vybizo ID</label>
      <div class="input-wrap">
        <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" name="user_id" placeholder="Enter your Vybizo ID" required/>
      </div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input type="password" name="password" placeholder="Enter your password" required/>
      </div>
    </div>
      <div class="forgot-link"><a href="/forgot" style="color: #c084fc; text-decoration: none; font-size: 12px; display: block; text-align: right; margin-bottom: 15px;">Forgot password?</a></div>
    <button type="submit" class="btn">Enter Vybizo</button>
  </form>

  <div class="divider">or</div>
  <div class="link-row" style="margin-top:13px;">New to Vybizo? <a href="/register">Join for free</a></div>
</div>

<script>
/* ══ TYPEWRITER — pure JS, zero CSS width conflict ══ */
const phrases = [
  "Vybe · Your Biz · Zero Limits",
  "Where Small Business Meets Social",
  "Vibrant · Yours · Bold · Infinite · Zeal · Open",
  "One Platform · Infinite Possibilities"
];
const el = document.getElementById('meaning');
let pi = 0, ci = 0, deleting = false;

function tick() {
  const phrase = phrases[pi];
  if (!deleting) {
    ci++;
    el.textContent = phrase.slice(0, ci);
    if (ci === phrase.length) {
      deleting = true;
      setTimeout(tick, 2400);   // pause at full phrase
      return;
    }
    setTimeout(tick, 60);       // typing speed
  } else {
    ci--;
    el.textContent = phrase.slice(0, ci);
    if (ci === 0) {
      deleting = false;
      pi = (pi + 1) % phrases.length;
      setTimeout(tick, 500);    // pause before next phrase
      return;
    }
    setTimeout(tick, 30);       // deleting speed (faster)
  }
}

// Wait for all letters to finish dropping before typing starts
setTimeout(tick, 1100);

/* ══ RIPPLE ══ */
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', e => {
    const r = document.createElement('span');
    const rect = btn.getBoundingClientRect();
    const s = Math.max(rect.width, rect.height);
    r.className = 'ripple';
    r.style.cssText = `width:${s}px;height:${s}px;left:${e.clientX-rect.left-s/2}px;top:${e.clientY-rect.top-s/2}px`;
    btn.appendChild(r);
    setTimeout(() => r.remove(), 600);
  });
});
</script>
</body>
</html>

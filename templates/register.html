<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vybizo — Join Free</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;min-height:100vh;background:#07000f;display:flex;align-items:center;justify-content:center;position:relative;padding:30px 16px;}
    .bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 40%,#1a0533 0%,transparent 55%),radial-gradient(ellipse at 80% 70%,#001a3d 0%,transparent 55%),#07000f;animation:bgShift 10s ease-in-out infinite alternate;}
    @keyframes bgShift{from{filter:hue-rotate(0deg);}to{filter:hue-rotate(25deg) brightness(1.12);}}
    .floaters{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    .floater{position:absolute;border-radius:22%;display:flex;align-items:center;justify-content:center;opacity:0.12;animation:bob ease-in-out infinite;}
    @keyframes bob{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-38px) rotate(180deg);}}
    .f1{left:3%;top:15%;width:46px;height:46px;background:#1877F2;animation-duration:7s;animation-delay:-2s;}
    .f2{left:85%;top:60%;width:36px;height:36px;background:#1877F2;animation-duration:9s;animation-delay:-4s;}
    .i1{left:75%;top:20%;width:50px;height:50px;background:linear-gradient(135deg,#833AB4,#FD1D1D,#FCAF45);animation-duration:8s;animation-delay:-3s;}
    .w1{left:8%;top:72%;width:44px;height:44px;background:#25D366;animation-duration:9s;animation-delay:-1s;}
    .w2{left:92%;top:35%;width:38px;height:38px;background:#25D366;animation-duration:6s;animation-delay:-5s;}

    /* ══ VYBIZO HERO ══ */
    .vybizo-hero{text-align:center;margin-bottom:4px;}
    .vybizo-word{font-family:'Syne',sans-serif;font-size:54px;font-weight:800;letter-spacing:4px;line-height:1;display:flex;justify-content:center;gap:2px;}
    .vybizo-word span{display:inline-block;position:relative;opacity:0;transform:translateY(-60px) scale(1.3);animation:letterDrop 0.6s cubic-bezier(0.22,1,0.36,1) forwards;}
    @keyframes letterDrop{0%{opacity:0;transform:translateY(-70px) scale(1.4) rotateX(-45deg);}60%{opacity:1;transform:translateY(8px) scale(0.95) rotateX(5deg);}80%{transform:translateY(-4px) scale(1.02);}100%{opacity:1;transform:translateY(0) scale(1) rotateX(0);}}
    .vybizo-word span:nth-child(1){animation-delay:0.1s;}
    .vybizo-word span:nth-child(2){animation-delay:0.22s;}
    .vybizo-word span:nth-child(3){animation-delay:0.34s;}
    .vybizo-word span:nth-child(4){animation-delay:0.46s;}
    .vybizo-word span:nth-child(5){animation-delay:0.58s;}
    .vybizo-word span:nth-child(6){animation-delay:0.70s;}
    .vybizo-word{animation:shimmerPulse 4s ease-in-out 1.4s infinite alternate;}
    @keyframes shimmerPulse{from{filter:brightness(1);}to{filter:brightness(1.3) drop-shadow(0 0 18px rgba(255,110,247,0.4));}}
    .lV{color:#ff6ef7;-webkit-text-stroke:1.5px #ff00e5;text-shadow:0 0 20px rgba(255,110,247,0.9),0 0 50px rgba(255,0,229,0.5),0 4px 0 rgba(180,0,160,0.6);filter:drop-shadow(0 0 8px rgba(255,0,229,0.7));}
    .lY{color:#ffb347;-webkit-text-stroke:1.5px #ff8c00;text-shadow:0 0 20px rgba(255,179,71,0.9),0 0 50px rgba(255,140,0,0.5),0 4px 0 rgba(180,90,0,0.6);filter:drop-shadow(0 0 8px rgba(255,140,0,0.7));}
    .lB{color:#7fffff;-webkit-text-stroke:1.5px #00d4d4;text-shadow:0 0 20px rgba(127,255,255,0.9),0 0 50px rgba(0,212,212,0.5),0 4px 0 rgba(0,130,130,0.6);filter:drop-shadow(0 0 8px rgba(0,212,212,0.7));}
    .lI{color:#ff6b9d;-webkit-text-stroke:1.5px #ff0055;text-shadow:0 0 20px rgba(255,107,157,0.9),0 0 50px rgba(255,0,85,0.5),0 4px 0 rgba(160,0,50,0.6);filter:drop-shadow(0 0 8px rgba(255,0,85,0.7));}
    .lZ{color:#a8ff6e;-webkit-text-stroke:1.5px #5aff00;text-shadow:0 0 20px rgba(168,255,110,0.9),0 0 50px rgba(90,255,0,0.5),0 4px 0 rgba(40,130,0,0.6);filter:drop-shadow(0 0 8px rgba(90,255,0,0.7));}
    .lO{color:#6eb5ff;-webkit-text-stroke:1.5px #007aff;text-shadow:0 0 20px rgba(110,181,255,0.9),0 0 50px rgba(0,122,255,0.5),0 4px 0 rgba(0,60,160,0.6);filter:drop-shadow(0 0 8px rgba(0,122,255,0.7));}

    /* TYPEWRITER */
    .vybizo-meaning-wrap{min-height:22px;margin-top:10px;margin-bottom:18px;text-align:center;}
    .vybizo-meaning{font-size:12px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.5);display:inline-block;border-right:2px solid #c084fc;padding-right:3px;white-space:nowrap;}

    /* CARD */
    .card{position:relative;z-index:10;width:min(440px,100%);background:rgba(255,255,255,0.06);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.13);border-radius:24px;padding:34px 36px 30px;box-shadow:0 0 80px rgba(168,85,247,0.18);animation:slideUp 0.65s cubic-bezier(0.22,1,0.36,1) both;}
    @keyframes slideUp{from{opacity:0;transform:translateY(36px) scale(0.96);}to{opacity:1;transform:translateY(0) scale(1);}}
    .sp-row{display:flex;justify-content:center;gap:8px;margin-bottom:18px;}
    .sp{display:flex;align-items:center;gap:5px;padding:4px 11px 4px 8px;border-radius:99px;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:#fff;}
    .sp-fb{background:#1877F2;}.sp-ig{background:linear-gradient(135deg,#833AB4,#FD1D1D,#FCAF45);}.sp-wa{background:#25D366;}
    .section-title{text-align:center;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:20px;}
    label{display:block;font-size:11px;font-weight:500;color:rgba(255,255,255,0.45);letter-spacing:0.7px;text-transform:uppercase;margin-bottom:6px;}
    .field{margin-bottom:14px;}
    .input-wrap{position:relative;}
    .input-wrap .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:0.3;pointer-events:none;}
    .prefix-wrap{display:flex;gap:8px;align-items:center;}
    .prefix{padding:11px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:rgba(255,255,255,0.4);font-size:13px;white-space:nowrap;}
    input[type=text],input[type=tel],input[type=password]{width:100%;padding:11px 14px 11px 40px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#fff;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;transition:border 0.2s,background 0.2s,box-shadow 0.2s;}
    input.no-icon{padding-left:14px;}
    input::placeholder{color:rgba(255,255,255,0.22);}
    input:focus{border-color:rgba(192,132,252,0.7);background:rgba(255,255,255,0.09);box-shadow:0 0 0 3px rgba(192,132,252,0.15);}
    .strength-bar{height:3px;border-radius:99px;background:rgba(255,255,255,0.08);margin-top:6px;overflow:hidden;}
    .strength-fill{height:100%;width:0%;border-radius:99px;transition:width 0.3s,background 0.3s;}
    .btn{position:relative;overflow:hidden;width:100%;padding:14px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#fff;border:none;border-radius:12px;cursor:pointer;background:linear-gradient(135deg,#ff6ef7,#a855f7,#007aff);background-size:200% 200%;background-position:left center;transition:background-position 0.4s,transform 0.15s,box-shadow 0.3s;box-shadow:0 4px 28px rgba(168,85,247,0.5);}
    .btn:hover{background-position:right center;box-shadow:0 6px 36px rgba(168,85,247,0.75);transform:translateY(-2px);}
    .btn:active{transform:scale(0.97);}
    .divider{display:flex;align-items:center;gap:10px;margin:16px 0 0;color:rgba(255,255,255,0.15);font-size:12px;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08);}
    .link-row{text-align:center;margin-top:12px;font-size:13px;color:rgba(255,255,255,0.35);}
    .link-row a{color:#c084fc;text-decoration:none;font-weight:600;}
    .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.3);transform:scale(0);animation:ripple 0.55s ease-out forwards;pointer-events:none;}
    @keyframes ripple{to{transform:scale(4.5);opacity:0;}}
  </style>
</head>
<body>
<div class="bg"></div>
<div class="floaters">
  <div class="floater f1"><svg width="23" height="23" viewBox="0 0 24 24" fill="white"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg></div>
  <div class="floater f2"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg></div>
  <div class="floater i1"><svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none"/></svg></div>
  <div class="floater w1"><svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></div>
  <div class="floater w2"><svg width="19" height="19" viewBox="0 0 24 24" fill="white"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg></div>
</div>

<div class="card">
  <div class="vybizo-hero">
    <div class="vybizo-word">
      <span class="lV">V</span><span class="lY">Y</span><span class="lB">B</span><span class="lI">I</span><span class="lZ">Z</span><span class="lO">O</span>
    </div>
    <div class="vybizo-meaning-wrap">
      <span class="vybizo-meaning" id="meaning"></span>
    </div>
  </div>

  <!-- flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  <div class="sp-row">
    <div class="sp sp-fb"><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z"/></svg>Facebook</div>
    <div class="sp sp-ig"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none"/></svg>Instagram</div>
    <div class="sp sp-wa"><svg width="12" height="12" viewBox="0 0 24 24" fill="white"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>WhatsApp</div>
  </div>
  <div class="section-title">— Create Account —</div>
  <form method="POST" action="/register">
    <div class="field">
      <label>Full Name</label>
      <div class="input-wrap">
        <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" name="name" placeholder="Your full name" required/>
      </div>
    </div>
    <div class="field">
      <label>Mobile Number</label>
      <div class="prefix-wrap">
        <span class="prefix">+91</span>
        <input type="tel" name="mobile" placeholder="10-digit mobile number" class="no-icon" maxlength="10" required/>
      </div>
    </div>
    <div class="field">
      <label>Vybizo ID</label>
      <div class="input-wrap">
        <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <input type="text" name="user_id" placeholder="Choose your unique Vybizo ID" required/>
      </div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input type="password" name="password" id="pwd" placeholder="Min 6 characters" required oninput="checkStrength(this.value)"/>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="sbar"></div></div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <svg class="ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        <input type="password" name="confirm" placeholder="Repeat password" required/>
      </div>
    </div>
    <button type="submit" class="btn">Join Vybizo Free</button>
  </form>
  <div class="divider">or</div>
  <div class="link-row" style="margin-top:12px;">Already on Vybizo? <a href="/login">Sign in</a></div>
</div>

<script>
/* TYPEWRITER */
const phrases = [
  "Vybe · Your Biz · Zero Limits",
  "Where Small Business Meets Social",
  "Vibrant · Yours · Bold · Infinite · Zeal · Open"
];
let pi=0,ci=0,deleting=false;
const el=document.getElementById('meaning');
function type(){
  const phrase=phrases[pi];
  if(!deleting){
    el.textContent=phrase.substring(0,ci+1); ci++;
    if(ci===phrase.length){deleting=true;setTimeout(type,2200);return;}
    setTimeout(type,55);
  } else {
    el.textContent=phrase.substring(0,ci-1); ci--;
    if(ci===0){deleting=false;pi=(pi+1)%phrases.length;setTimeout(type,400);return;}
    setTimeout(type,28);
  }
}
setTimeout(type,1300);

function checkStrength(v){
  const b=document.getElementById('sbar');
  const s=[v.length>=6,/[A-Z]/.test(v),/[0-9]/.test(v),/[^A-Za-z0-9]/.test(v),v.length>=10];
  const n=s.filter(Boolean).length;
  const colors=['#ef4444','#f97316','#eab308','#22c55e','#10b981'];
  b.style.width=(n*20)+'%'; b.style.background=colors[n-1]||'transparent';
}
document.querySelectorAll('.btn').forEach(btn=>{
  btn.addEventListener('click',function(e){
    const r=document.createElement('span');const rect=btn.getBoundingClientRect();const size=Math.max(rect.width,rect.height);
    r.className='ripple';r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    btn.appendChild(r);setTimeout(()=>r.remove(),600);
  });
});
</script>
</body>
</html>
